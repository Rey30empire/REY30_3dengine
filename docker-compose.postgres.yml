services:
  postgres:
    image: postgres:16-alpine
    container_name: rey30-postgres
    restart: unless-stopped
    ports:
      - "${REY30_POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: rey30
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - rey30-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rey30"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  rey30-postgres-data:
