name: CI Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  quality-gate:
    name: Release Seal
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: rey30
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d rey30"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/rey30?schema=public
      RUST_LOG: info

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply Prisma migrations
        run: pnpm run db:deploy

      - name: Run release seal
        run: pnpm run release:full
