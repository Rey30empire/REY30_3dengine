name: Backup + Restore Drill

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to run backup/restore drill against
        required: false
        type: string

jobs:
  backup-drill:
    name: Create backup, verify, restore dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKUP_BASE_URL: ${{ inputs.base_url || vars.PRODUCTION_BASE_URL || secrets.PRODUCTION_BASE_URL }}
      REY30_OPS_TOKEN: ${{ secrets.REY30_OPS_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required vars
        run: |
          if [ -z "$BACKUP_BASE_URL" ]; then
            echo "BACKUP_BASE_URL is missing. Configure workflow input or PRODUCTION_BASE_URL."
            exit 1
          fi
          if [ -z "$REY30_OPS_TOKEN" ]; then
            echo "REY30_OPS_TOKEN is missing. Configure secret before running."
            exit 1
          fi

      - name: Create backup
        run: |
          node scripts/ops-backup-client.mjs create \
            --base-url "$BACKUP_BASE_URL" \
            --ops-token "$REY30_OPS_TOKEN" \
            --note "scheduled_backup_drill_${{ github.run_id }}" \
            --report-path output/backup-create.json

      - name: Capture backup id
        id: capture_backup
        run: |
          BACKUP_ID=$(node -e "const fs=require('fs');const o=JSON.parse(fs.readFileSync('output/backup-create.json','utf8'));process.stdout.write(o.backup?.backupId||'')")
          if [ -z "$BACKUP_ID" ]; then
            echo "Unable to read backup id from output/backup-create.json"
            exit 1
          fi
          echo "backup_id=$BACKUP_ID" >> "$GITHUB_OUTPUT"
          echo "Backup ID: $BACKUP_ID"

      - name: Verify backup integrity
        run: |
          node scripts/ops-backup-client.mjs verify \
            --base-url "$BACKUP_BASE_URL" \
            --ops-token "$REY30_OPS_TOKEN" \
            --backup-id "${{ steps.capture_backup.outputs.backup_id }}" \
            --report-path output/backup-verify.json

      - name: Run restore dry-run
        run: |
          node scripts/ops-backup-client.mjs restore-dry-run \
            --base-url "$BACKUP_BASE_URL" \
            --ops-token "$REY30_OPS_TOKEN" \
            --backup-id "${{ steps.capture_backup.outputs.backup_id }}" \
            --report-path output/backup-restore-dry-run.json

      - name: Upload drill artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-restore-drill-${{ github.run_id }}
          path: output/*.json
          if-no-files-found: ignore

      - name: Trigger incident alert webhook
        if: failure() && secrets.ALERT_WEBHOOK_URL != ''
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node scripts/trigger-alert-webhook.mjs \
            --severity "critical" \
            --environment "production" \
            --message "Backup/restore drill failed for REY30 production." \
            --run-url "$GITHUB_RUN_URL"

