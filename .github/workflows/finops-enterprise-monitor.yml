name: FinOps Enterprise Monitor

on:
  schedule:
    - cron: '15 3 * * *'
  workflow_dispatch:
    inputs:
      base_url:
        description: Base URL to monitor enterprise FinOps
        required: false
        type: string
      months:
        description: Number of months in report window (1-12)
        required: true
        default: '6'
        type: string
      fail_on_warning:
        description: Fail workflow on warning alerts
        required: true
        default: false
        type: boolean
      fail_on_high:
        description: Fail workflow on high-severity incidents
        required: true
        default: false
        type: boolean
      fail_on_pending:
        description: Fail workflow if there are pending approvals
        required: true
        default: false
        type: boolean

jobs:
  monitor:
    name: Run enterprise finops monitor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FINOPS_BASE_URL: ${{ inputs.base_url || vars.PRODUCTION_BASE_URL || secrets.PRODUCTION_BASE_URL }}
      REY30_OPS_TOKEN: ${{ secrets.REY30_OPS_TOKEN }}
      ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
      GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate required vars
        run: |
          if [ -z "$FINOPS_BASE_URL" ]; then
            echo "FINOPS_BASE_URL is missing. Configure workflow input or PRODUCTION_BASE_URL."
            exit 1
          fi
          if [ -z "$REY30_OPS_TOKEN" ]; then
            echo "REY30_OPS_TOKEN is missing. Configure secret before running."
            exit 1
          fi

      - name: Run enterprise monitor
        run: |
          node scripts/monitor-finops-enterprise.mjs \
            --base-url "$FINOPS_BASE_URL" \
            --ops-token "$REY30_OPS_TOKEN" \
            --months "${{ inputs.months || '6' }}" \
            --fail-on-critical "true" \
            --fail-on-high "${{ inputs.fail_on_high || 'false' }}" \
            --fail-on-warning "${{ inputs.fail_on_warning || 'false' }}" \
            --fail-on-pending "${{ inputs.fail_on_pending || 'false' }}" \
            --report-path output/usage-enterprise-report.json

      - name: Upload enterprise report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finops-enterprise-report-${{ github.run_id }}
          path: output/usage-enterprise-report.json
          if-no-files-found: ignore

      - name: Trigger incident alert webhook
        if: failure() && env.ALERT_WEBHOOK_URL != ''
        run: |
          node scripts/trigger-alert-webhook.mjs \
            --severity "critical" \
            --environment "production" \
            --message "FinOps enterprise monitor detected critical incidents or pending approvals." \
            --run-url "$GITHUB_RUN_URL"
